<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist for {{ username }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .error { color: red; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>my steam page</h1>
    <h2>Wishlist for {{ username }}</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if games %}
        <table>
            <thead>
                <tr>
                    <th>Game ID</th>
                    <th>Game Name</th>
                </tr>
            </thead>
            <tbody>
                {% for app_id, name in games %}
                <tr>
                    <td>{{ app_id }}</td>
                    <td>{{ name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% elif not error %}
        <p>No games found in the wishlist or the wishlist is private.</p>
    {% endif %}
</body>
</html>
